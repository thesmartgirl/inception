# Add this at the top of your nginx configuration file (outside the server block) 
# if it is not already included in your global nginx.conf layout.
include /etc/nginx/mime.types;

server {
    listen 443 ssl;
    server_name ataan.42.fr;
    
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/html;
    index index.php;

    # 1. Main location router
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # 2. Force Nginx to pass missing static files to WordPress PHP-FPM
    # This solves the MIME type "text/html" error by ensuring files are properly processed
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|svg)$ {
        try_files $uri /index.php?$args;
        expires max;
        log_not_found off;
    }

    # 3. PHP processing block
    location ~ \.php$ {
        include fastcgi_params;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_pass wordpress:9000;
        
        # Crucial Reverse Proxy Headers
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTPS on;
    }
}

