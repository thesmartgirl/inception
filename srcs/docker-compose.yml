services:
  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    secrets:
      - db_password
      - db_root_password
      
  wordpress:
    depends_on:
      - mariadb
    build:
      context: ./requirements/wordpress
    container_name: wordpress
    restart: always
    env_file:
      - .env
    volumes:
      - wp_website_data:/var/www/html
    networks:
      - inception
    secrets:
      - db_password
      - db_root_password
      - wp_admin_password
      - wp_user_password
  
  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    restart: always
    env_file:
      - .env
    volumes:
      - wp_website_data:/var/www/html
    networks:
      - inception
    ports:
      - "443:443"

volumes:
  mariadb_data:
  wp_website_data:

networks:
  inception:
 
secrets:
  db_password:
    file: ../secrets/db_password.txt

  db_root_password:
    file: ../secrets/db_root_password.txt

  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
   
  wp_user_password:
    file: ../secrets/wp_user_password.txt

